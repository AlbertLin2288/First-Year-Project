name: Build pdf for master
on:
  push:
    branches: ["master", "original"]
  pull_request:
    branches: ["master", "original"]
  workflow_dispatch:
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository for branch master
        uses: actions/checkout@v6
        with:
          ref: "master"
          path: "master"

      - name: Set up Git repository for branch original
        uses: actions/checkout@v6
        with:
          ref: "original"
          path: "original"

      - name: Compile LaTeX document for main
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: master

      - name: Compile LaTeX document for original
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: original

      - name: Copy compiled pdf
        run: |
          mkdir page_file
          cp ./master/main.pdf ./page_file/main.pdf
          cp ./original/main.pdf ./page_file/original.pdf
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: page_file
  deploy:
    needs: [build_latex]

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
